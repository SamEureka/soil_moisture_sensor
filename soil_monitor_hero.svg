<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Soil moisture monitor hero illustration</title>
  <desc>A whimsical garden scene showing solar-powered ESP32 sensor nodes monitoring plants, with data flowing wirelessly to the cloud</desc>

  <style>
    .sky { fill: #e8f4fd }
    .ground { fill: #8B6914 }
    .soil { fill: #6B4F12 }
    .grass { fill: #4a9e3f }
    .stem { fill: none; stroke: #2d7a27; stroke-width: 3; stroke-linecap: round }
    .leaf { fill: #4a9e3f }
    .pea-pod { fill: #5db84f }
    .pea { fill: #7dd96e }
    .tomato { fill: #e85d3a }
    .panel { fill: #1a5f9e; stroke: #0d3d6b; stroke-width: 1 }
    .panel-cell { fill: none; stroke: #2d7fbe; stroke-width: 0.5 }
    .enclosure { fill: #e8e8e8; stroke: #aaaaaa; stroke-width: 1 }
    .enc-window { fill: #cce8ff; stroke: #99ccee; stroke-width: 0.5 }
    .sensor-probe { fill: none; stroke: #888; stroke-width: 2; stroke-linecap: round }
    .sensor-pcb { fill: #2a7a2a; stroke: #1a5a1a; stroke-width: 0.5 }
    .wire { fill: none; stroke: #555; stroke-width: 1.5; stroke-linecap: round }
    .signal { fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-dasharray: 4 3 }
    .cloud-body { fill: #ffffff; stroke: #ccddee; stroke-width: 1 }
    .lbl { font-family: monospace; font-size: 11px; fill: #445566 }
    .title-txt { font-family: sans-serif; font-size: 22px; font-weight: 500; fill: #1a3a5c }
    .sub-txt { font-family: sans-serif; font-size: 13px; fill: #4a6a8a }
    .uid { font-family: monospace; font-size: 9px; fill: #ffffff }
    .sun-ray { fill: none; stroke: #f5c842; stroke-width: 2; stroke-linecap: round }
  </style>

  <rect class="sky" x="0" y="0" width="680" height="280"/>
  <rect class="ground" x="0" y="280" width="680" height="20"/>
  <rect class="soil" x="0" y="300" width="680" height="120"/>

  <circle cx="580" cy="62" r="28" fill="#f5c842" stroke="#e8a800" stroke-width="2"/>
  <line class="sun-ray" x1="580" y1="22" x2="580" y2="14"/>
  <line class="sun-ray" x1="580" y1="102" x2="580" y2="110"/>
