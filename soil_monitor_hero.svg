    <line class="sensor-probe" x1="22" y1="38" x2="22" y2="58"/>
    <line class="sensor-probe" x1="30" y1="38" x2="30" y2="58"/>
  </g>

  <path d="M 80 310 Q 100 295 120 310 Q 140 295 160 310 Q 180 295 200 310 Q 220 295 240 310 Q 260 295 280 310 Q 300 295 320 310 Q 340 295 360 310 Q 380 295 400 310 Q 420 295 440 310 Q 460 295 480 310 Q 500 295 520 310 Q 540 295 560 310 Q 580 295 600 310" fill="none" stroke="#4a9e3f" stroke-width="3"/>
  <rect x="0" y="320" width="680" height="8" fill="#5a3e0e" opacity="0.5"/>

  <path d="M 90 350 Q 95 330 100 310" class="wire" stroke="#7a5a2a" stroke-width="1"/>
  <path d="M 210 360 Q 218 340 225 310" class="wire" stroke="#7a5a2a" stroke-width="1"/>
