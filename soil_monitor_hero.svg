  <path class="stem" d="M 377 250 C 358 242 348 235 342 228"/>
  <path class="stem" d="M 376 225 C 394 216 400 208 403 200"/>
  <ellipse class="leaf" cx="340" cy="226" rx="18" ry="9" transform="rotate(-15 340 226)"/>
  <ellipse class="leaf" cx="405" cy="198" rx="18" ry="9" transform="rotate(10 405 198)"/>
  <circle class="tomato" cx="373" cy="185" r="14"/>
  <path d="M 368 173 C 370 168 376 167 378 172" fill="none" stroke="#2d7a27" stroke-width="2"/>

