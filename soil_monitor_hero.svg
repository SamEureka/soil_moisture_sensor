    <line class="panel-cell" x1="6" y1="-45" x2="46" y2="-45"/>
    <line class="panel-cell" x1="6" y1="-39" x2="46" y2="-39"/>
    <line class="wire" x1="26" y1="8" x2="26" y2="30"/>
