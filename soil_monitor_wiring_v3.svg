<svg width="800" height="1100" viewBox="0 0 800 1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vintage Grain Filter -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1" />
      </feComponentTransfer>
      <feComposite operator="in" in2="SourceGraphic" />
    </filter>

    <!-- Pie Eye Pattern -->
    <symbol id="pie-eye" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="9" fill="black" />
      <path d="M10 10 L19 6 A 9 9 0 0 0 14 1 Z" fill="#FDF5E6" />
    </symbol>
  </defs>

  <!-- Background: Vintage Parchment -->
  <rect width="800" height="1100" fill="#FDF5E6" />
  <rect width="800" height="1100" fill="black" opacity="0.03" filter="url(#grain)" />

  <!-- ══ SOLAR PANEL (The Sun-Worshiper) ══ -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="160" height="80" rx="15" fill="#2D2926" stroke="black" stroke-width="4" />
    <path d="M10,20 L150,20 M10,40 L150,40 M10,60 L150,60 M40,10 L40,70 M80,10 L80,70 M120,10 L120,70" stroke="#F1C400" stroke-width="1" opacity="0.3"/>
    <use href="#pie-eye" x="110" y="10" width="20" height="20" />
    <use href="#pie-eye" x="135" y="10" width="20" height="20" />
    <path d="M115,45 Q130,60 145,45" fill="none" stroke="#D22630" stroke-width="3" stroke-linecap="round" />
    <text x="10" y="-10" font-family="monospace" font-weight="bold" font-size="16">SOLAR PANEL</text>
    <text x="10" y="95" font-family="monospace" font-size="12">6V · 2-3W</text>
  </g>

  <!-- ══ CN3065 (The Traffic Cop) ══ -->
  <g transform="translate(60, 220)">
    <rect x="0" y="0" width="200" height="100" rx="10" fill="#008B8B" stroke="black" stroke-width="4" />
    <use href="#pie-eye" x="140" y="20" width="25" height="25" />
    <use href="#pie-eye" x="170" y="20" width="25" height="25" />
    <path d="M150,65 L180,65" stroke="black" stroke-width="4" stroke-linecap="round" />
    <text x="10" y="25" font-family="monospace" font-weight="bold" font-size="18" fill="white">CN3065</text>
    <text x="10" y="45" font-family="monospace" font-size="12" fill="white">CHARGE CONTROL</text>
    <text x="5" y="85" font-family="monospace" font-size="10" fill="white">SOLAR± BAT± OUT±</text>
  </g>

  <!-- ══ LiPo BATTERY (The Power Jug) ══ -->
  <g transform="translate(60, 400)">
    <path d="M0,20 Q0,0 20,0 L140,0 Q160,0 160,20 L160,60 Q160,80 140,80 L20,80 Q0,80 0,60 Z" fill="#D22630" stroke="black" stroke-width="4" />
    <rect x="160" y="25" width="15" height="30" rx="5" fill="black" />
    <use href="#pie-eye" x="30" y="20" width="20" height="20" />
    <use href="#pie-eye" x="60" y="20" width="20" height="20" />
    <path d="M35,55 Q50,70 65,55" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" />
    <text x="5" y="-10" font-family="monospace" font-weight="bold" font-size="16">LiPo BATTERY</text>
    <text x="85" y="35" font-family="monospace" font-size="12" fill="white">1100mAh</text>
  </g>

  <!-- ══ XIAO (The Mastermind) ══ -->
  <g transform="translate(60, 550)">
    <rect x="0" y="0" width="220" height="250" rx="20" fill="#2D2926" stroke="black" stroke-width="5" />
    <rect x="40" y="40" width="140" height="140" rx="10" fill="#F1C400" stroke="black" stroke-width="2" />
    <use href="#pie-eye" x="70" y="60" width="40" height="40" />
    <use href="#pie-eye" x="120" y="60" width="40" height="40" />
    <path d="M90,140 Q110,170 130,140" fill="#D22630" stroke="black" stroke-width="2" />
    <text x="110" y="210" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="24" fill="white">XIAO</text>
    <text x="110" y="235" text-anchor="middle" font-family="monospace" font-size="14" fill="#F1C400">ESP32-C3</text>
    <g font-family="monospace" font-size="11" fill="#FDF5E6">
      <text x="10" y="30">5V</text>
      <text x="10" y="60">GND</text>
      <text x="10" y="90">3V3</text>
      <text x="10" y="180">D0(ADC)</text>
      <text x="10" y="205">D2(PWR)</text>
      <text x="10" y="230">D4(SDA)</text>
      <text x="10" y="245">D5(SCL)</text>
    </g>
  </g>

  <!-- ══ BH1750 (The Light Minion) ══ -->
  <g transform="translate(450, 350)">
    <circle cx="50" cy="50" r="50" fill="#008B8B" stroke="black" stroke-width="4" />
    <circle cx="50" cy="50" r="15" fill="black" />
    <use href="#pie-eye" x="15" y="20" width="20" height="20" />
    <use href="#pie-eye" x="65" y="20" width="20" height="20" />
    <text x="0" y="120" font-family="monospace" font-weight="bold" font-size="16">BH1750</text>
    <text x="0" y="140" font-family="monospace" font-size="10">Light Sensor</text>
  </g>

  <!-- ══ HW-390 (The Dirt Diver) ══ -->
  <g transform="translate(450, 600)">
    <path d="M20,0 L80,0 L90,150 Q50,180 10,150 Z" fill="#006400" stroke="black" stroke-width="4" />
    <use href="#pie-eye" x="30" y="20" width="15" height="15" />
    <use href="#pie-eye" x="55" y="20" width="15" height="15" />
    <path d="M40,50 Q50,60 60,50" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" />
    <text x="0" y="-10" font-family="monospace" font-weight="bold" font-size="16">HW-390</text>
    <text x="0" y="190" font-family="monospace" font-size="10">Moisture Sensor</text>
  </g>

  <!-- ════ RUBBER HOSE WIRES ════ -->
  <g fill="none" stroke-width="5" stroke-linecap="round">
    <path d="M140,140 C140,180 320,180 320,240" stroke="#BA7517" />
    <path d="M100,140 C100,200 280,200 280,220" stroke="black" />
    <path d="M100,320 C100,360 140,360 140,400" stroke="#D22630" />
    <path d="M80,320 C80,360 40,360 40,400" stroke="black" />
    <path d="M200,320 C300,320 300,500 100,500 L100,550" stroke="#D22630" />
    <path d="M180,320 C250,320 250,520 80,520 L80,550" stroke="black" />
    <path d="M280,580 C350,580 400,400 450,400" stroke="#D22630" />
    <path d="M280,610 C350,610 420,420 450,420" stroke="black" />
    <path d="M280,780 C380,780 400,440 450,440" stroke="#7F77DD" />
    <path d="M280,795 C400,795 420,460 470,450" stroke="#534AB7" />
    <path d="M280,755 C350,755 400,600 450,600" stroke="#639922" />
    <path d="M280,730 C350,730 400,620 450,620" stroke="#1D9E75" />
  </g>

  <!-- ════ LEGEND ════ -->
  <g transform="translate(450, 800)">
    <rect width="300" height="250" rx="10" fill="white" stroke="black" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="10" y="30" font-family="monospace" font-weight="bold" font-size="20">LEGEND</text>
    <g transform="translate(10, 50)" font-family="monospace" font-size="12">
      <line x1="0" y1="10" x2="40" y2="10" stroke="#D22630" stroke-width="4"/> <text x="50" y="15">Power (3V3/5V)</text>
      <line x1="0" y1="40" x2="40" y2="40" stroke="black" stroke-width="4"/> <text x="50" y="45">Ground</text>
      <line x1="0" y1="70" x2="40" y2="70" stroke="#BA7517" stroke-width="4"/> <text x="50" y="75">Solar Input</text>
      <line x1="0" y1="100" x2="40" y2="100" stroke="#7F77DD" stroke-width="4"/> <text x="50" y="105">I2C Data (SDA)</text>
      <line x1="0" y1="130" x2="40" y2="130" stroke="#534AB7" stroke-width="4"/> <text x="50" y="135">I2C Clock (SCL)</text>
    </g>
  </g>

  <rect x="10" y="10" width="780" height="1080" fill="none" stroke="black" stroke-width="2" rx="20"/>
</svg>